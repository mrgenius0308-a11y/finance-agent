<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Base palette */
      --bg:             #0a0a12;
      --sidebar-bg:     #0d0d18;
      --surface:        #12121e;
      --card:           #181826;
      --border:         #22223a;
      --border-soft:    #1a1a2e;

      /* Accent */
      --accent:         #5b6af7;
      --accent-dim:     rgba(91,106,247,.11);
      --accent-glow:    rgba(91,106,247,.32);
      --accent-hover:   #4a58e6;
      --accent-text:    #8b97fb;

      /* Semantic */
      --success:        #34d399;
      --success-dim:    rgba(52,211,153,.12);
      --error:          #f87171;
      --error-dim:      rgba(248,113,113,.08);
      --warn:           #fbbf24;

      /* Text */
      --text:           #c4cde0;
      --text-strong:    #e6ecf6;
      --text-muted:     #5a6278;

      /* User bubble */
      --user-from:      #4a58e6;
      --user-to:        #7c3aed;

      /* Radii */
      --r:              8px;
      --r-lg:           14px;
      --r-xl:           18px;

      /* Transitions */
      --t-fast:         150ms ease;
      --t-med:          200ms ease;
      --t-slow:         250ms ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ─── Scrollbars ─────────────────────────────────────────── */
    ::-webkit-scrollbar            { width: 4px; }
    ::-webkit-scrollbar-track      { background: transparent; }
    ::-webkit-scrollbar-thumb      { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover{ background: #2e2e50; }

    /* ─── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      transition: width var(--t-slow), min-width var(--t-slow);
    }

    /* Logo */
    .sidebar-logo {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }

    .logo-gem {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .logo-copy h1 { font-size: 14px; font-weight: 700; color: var(--text-strong); letter-spacing: -.01em; }
    .logo-copy p  { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }

    /* Sidebar sections */
    .sb-section {
      padding: 14px 13px 12px;
      flex-shrink: 0;
    }
    .sb-section + .sb-section { border-top: 1px solid var(--border-soft); }
    .sb-section.grow { flex: 1; overflow-y: auto; min-height: 0; }

    .sb-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      padding: 0 2px;
      margin-bottom: 9px;
    }

    /* Provider tabs */
    .provider-tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .ptab {
      flex: 1;
      padding: 6px 0;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .ptab:not(:last-child) { border-right: 1px solid var(--border); }
    .ptab.active           { background: var(--accent); color: #fff; }
    .ptab:disabled         { opacity: .38; cursor: not-allowed; }

    #model-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 7px 9px;
      font-size: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color var(--t-fast);
    }
    #model-select:focus    { border-color: var(--accent); }
    #model-select:disabled { opacity: .38; cursor: not-allowed; }
    #model-select option   { background: var(--card); }

    #ollama-url-wrap {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-top: 7px;
    }
    #ollama-url-wrap span { font-size: 11px; color: var(--text-muted); }
    #ollama-url {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 7px 9px;
      font-size: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color var(--t-fast);
    }
    #ollama-url:focus    { border-color: var(--accent); }
    #ollama-url:disabled { opacity: .38; }

    /* ── State: session-locked ─────────────────────────────── */
    #session-lock {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(91,106,247,.22);
      border-radius: var(--r);
      font-size: 11px;
      color: var(--accent-text);
      margin-top: 8px;
      transition: opacity var(--t-med);
    }
    #session-lock.visible { display: flex; }

    .lock-icon {
      width: 18px; height: 18px;
      background: rgba(91,106,247,.18);
      border-radius: 4px;
      display: grid; place-items: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    /* Active provider pill */
    #active-provider-pill {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-strong);
    }
    #active-provider-pill.visible { display: flex; }
    .pill-dot            { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pill-dot.groq       { background: #818cf8; box-shadow: 0 0 6px #818cf880; }
    .pill-dot.ollama     { background: #fb923c; box-shadow: 0 0 6px #fb923c80; }

    /* ── Upload button (idle state) ──────────────────────────── */
    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 9px 12px;
      border: 1.5px dashed var(--border);
      border-radius: var(--r);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      transition: border-color var(--t-fast), color var(--t-fast), background var(--t-fast);
    }
    .upload-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #file-input { display: none; }

    /* ── State: uploading ─────────────────────────────────────── */
    .upload-btn.uploading {
      border-style: solid;
      border-color: var(--accent);
      color: var(--accent-text);
      background: var(--accent-dim);
      cursor: not-allowed;
      pointer-events: none;
    }

    .upload-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(91,106,247,.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .upload-progress-wrap {
      display: none;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .upload-progress-wrap.visible { display: block; }
    .upload-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width var(--t-slow);
      border-radius: 2px;
    }
    .upload-progress-bar.indeterminate {
      width: 40%;
      animation: progress-slide 1.2s ease-in-out infinite alternate;
    }
    @keyframes progress-slide {
      from { transform: translateX(-100%); }
      to   { transform: translateX(250%); }
    }

    /* ── State: file-loaded (file badge) ─────────────────────── */
    #file-badge {
      display: none;
      flex-direction: column;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 11px;
      margin-top: 8px;
      animation: fadein var(--t-med);
    }
    #file-badge.visible { display: flex; }

    .badge-top { display: flex; align-items: center; gap: 9px; }

    .badge-file-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 7px;
      display: grid; place-items: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .badge-info { flex: 1; min-width: 0; }
    .file-name  { font-size: 12px; font-weight: 600; color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .badge-actions { display: flex; gap: 5px; }

    .badge-btn {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: border-color var(--t-fast), color var(--t-fast);
    }
    .badge-btn:hover       { border-color: var(--accent); color: var(--accent); }
    .badge-btn.rm:hover    { border-color: var(--error);  color: var(--error);  }

    /* Suggestions */
    #suggestions {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .suggestion {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .suggestion:hover { background: var(--surface); color: var(--text); }

    /* Sidebar footer */
    .sb-footer {
      padding: 10px 13px 14px;
      border-top: 1px solid var(--border-soft);
      flex-shrink: 0;
    }

    #clear-btn {
      width: 100%;
      padding: 8px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: border-color var(--t-fast), color var(--t-fast), background var(--t-fast);
    }
    #clear-btn:hover { border-color: var(--error); color: var(--error); background: var(--error-dim); }

    /* ─── Main area ──────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-width: 0;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 22px;
      height: 44px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
      background: var(--bg);
    }

    #header-subtitle { font-size: 12px; color: var(--text-muted); flex: 1; transition: color var(--t-med); }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 7px var(--success);
      transition: background var(--t-med), box-shadow var(--t-med);
    }
    .status-dot.error  { background: var(--error); box-shadow: 0 0 7px var(--error); }
    .status-dot.busy   { background: var(--warn);  box-shadow: 0 0 7px var(--warn); animation: pulse 1.2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ─── Messages ───────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 760px;
      animation: fadein var(--t-med) ease;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }
    .msg.error { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 13px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .msg.user  .avatar { background: linear-gradient(135deg, var(--user-from), var(--user-to)); color: #fff; }
    .msg.bot   .avatar { background: var(--surface); border: 1px solid var(--border); color: #8b8fa8; font-size: 15px; }
    .msg.error .avatar { background: var(--error-dim); color: var(--error); border: 1px solid rgba(248,113,113,.15); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--r-lg);
      font-size: 13.5px;
      line-height: 1.72;
      max-width: 640px;
    }

    .msg.user  .bubble {
      background: linear-gradient(135deg, var(--user-from), var(--user-to));
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 22px rgba(74,88,230,.25);
    }
    .msg.bot   .bubble {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    /* ── State: error message ──────────────────────────────── */
    .msg.error .bubble {
      background: var(--error-dim);
      border: 1px solid rgba(248,113,113,.18);
      color: var(--error);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubbles */
    .bubble h1,.bubble h2,.bubble h3 { margin: .7em 0 .3em; color: var(--text-strong); }
    .bubble h1 { font-size: 1.05em; } .bubble h2 { font-size: 1em; } .bubble h3 { font-size: .95em; }
    .bubble p  { margin: .35em 0; }
    .bubble ul,.bubble ol { margin: .35em 0 .35em 1.4em; }
    .bubble li { margin: .2em 0; }
    .bubble strong { font-weight: 600; color: var(--text-strong); }
    .bubble code   { background: rgba(255,255,255,.07); border-radius: 4px; padding: 1px 6px; font-family: "SF Mono","Fira Code",monospace; font-size: .85em; }
    .msg.user .bubble code { background: rgba(255,255,255,.18); }
    .bubble pre     { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; overflow-x: auto; margin: .55em 0; }
    .bubble pre code{ background: none; padding: 0; }
    .bubble table   { border-collapse: collapse; width: 100%; margin: .55em 0; font-size: .9em; }
    .bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th      { background: var(--card); font-weight: 600; color: var(--text-strong); }

    /* ── State: thinking / typing indicator ────────────────── */
    .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; opacity: .5; animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-5px);opacity:1} }

    /* System message */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 2px 0;
    }

    /* ── State: empty ────────────────────────────────────────── */
    #empty-state {
      margin: auto;
      text-align: center;
      padding: 48px 24px;
      animation: fadein var(--t-slow);
    }
    #empty-state .es-icon {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: var(--r-xl);
      display: grid; place-items: center;
      font-size: 30px;
      margin: 0 auto 20px;
      box-shadow: 0 0 48px var(--accent-glow);
    }
    #empty-state h2 { font-size: 21px; font-weight: 700; color: var(--text-strong); margin-bottom: 9px; letter-spacing: -.02em; }
    #empty-state p  { font-size: 13.5px; color: var(--text-muted); max-width: 310px; line-height: 1.65; }

    /* ── Quick-start chips inside empty state ─────────────── */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 22px;
    }
    .quick-chip {
      padding: 6px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: border-color var(--t-fast), color var(--t-fast), background var(--t-fast);
    }
    .quick-chip:hover { border-color: var(--accent); color: var(--accent-text); background: var(--accent-dim); }

    /* ─── Input bar ──────────────────────────────────────────── */
    #input-bar {
      padding: 10px 22px 18px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .input-shell {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 10px 12px;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .input-shell:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .input-shell.disabled {
      opacity: .5;
      pointer-events: none;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-strong);
      resize: none;
      max-height: 130px;
      line-height: 1.55;
    }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px; height: 36px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: opacity var(--t-fast), transform .1s, box-shadow var(--t-fast);
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    #send-btn:hover    { opacity: .9; box-shadow: 0 4px 20px rgba(91,106,247,.5); }
    #send-btn:active   { transform: scale(.91); }
    #send-btn:disabled { background: var(--card); box-shadow: none; cursor: not-allowed; }

    /* ─── Drag-over overlay ──────────────────────────────────── */
    #drag-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(91,106,247,.06);
      border: 2.5px dashed var(--accent);
      z-index: 100;
      pointer-events: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      font-size: 19px; font-weight: 700; color: var(--accent);
      backdrop-filter: blur(8px);
      transition: opacity var(--t-fast);
    }
    /* ── State: drag-over ─────────────────────────────────────── */
    #drag-overlay.active { display: flex; animation: fadein var(--t-fast); }

    .drag-icon {
      width: 72px; height: 72px;
      background: var(--accent-dim);
      border: 2px solid rgba(91,106,247,.3);
      border-radius: var(--r-xl);
      display: grid; place-items: center;
      font-size: 34px;
      margin-bottom: 4px;
    }

    /* ─── Toast notifications ────────────────────────────────── */
    #toast-root {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: toast-in .2s ease;
      max-width: 320px;
    }
    .toast.error  { border-color: rgba(248,113,113,.28); background: rgba(30,14,14,.9); color: var(--error); }
    .toast.success{ border-color: rgba(52,211,153,.22); }
    @keyframes toast-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ─── Hidden legacy div ──────────────────────────────────── */
    #provider-bar { display: none; }

    /* ─── Responsive: 768px ──────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      #messages { padding: 16px 14px 8px; }
      #input-bar { padding: 8px 14px 14px; }
      .top-bar   { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Drag-over overlay -->
<div id="drag-overlay">
  <div class="drag-icon">📂</div>
  Drop your CSV or Excel file here
</div>

<!-- Toast container -->
<div id="toast-root"></div>

<!-- Hidden legacy div -->
<div id="provider-bar"></div>

<!-- ─── Sidebar ───────────────────────────────────────────────── -->
<aside class="sidebar">

  <!-- Logo / header -->
  <div class="sidebar-logo">
    <div class="logo-gem">💎</div>
    <div class="logo-copy">
      <h1>Finance Agent</h1>
      <p id="header-subtitle">Loading…</p>
    </div>
  </div>

  <!-- Provider section -->
  <div class="sb-section">
    <div class="sb-label">Provider</div>

    <div class="provider-tabs">
      <button class="ptab active" id="tab-groq"   onclick="selectProvider('groq')">☁ Groq</button>
      <button class="ptab"        id="tab-ollama" onclick="selectProvider('ollama')">⬡ Ollama</button>
    </div>

    <select id="model-select" title="Model"></select>

    <div id="ollama-url-wrap">
      <span>Ollama URL</span>
      <input id="ollama-url" type="text" value="http://localhost:11434/v1" placeholder="http://localhost:11434/v1" />
    </div>

    <!-- ── State: session-locked ── -->
    <div id="session-lock">
      <div class="lock-icon">🔒</div>
      <span>Locked — click <strong>New chat</strong> to switch</span>
    </div>

    <!-- Active provider pill -->
    <div id="active-provider-pill">
      <div class="pill-dot" id="pill-dot"></div>
      <span id="pill-label"></span>
      <span style="color:var(--text-muted);font-size:11px;font-weight:400" id="pill-model"></span>
    </div>
  </div>

  <!-- Data / file section -->
  <div class="sb-section">
    <div class="sb-label">Data</div>

    <!-- ── State: idle upload ── -->
    <label class="upload-btn" id="upload-label" for="file-input">
      <span id="upload-label-icon">📎</span>
      <span id="upload-label-text">Upload CSV / Excel</span>
    </label>
    <input id="file-input" type="file" accept=".csv,.xlsx,.xls" onchange="handleUpload(this)" />

    <!-- Progress bar (uploading state) -->
    <div class="upload-progress-wrap" id="upload-progress-wrap">
      <div class="upload-progress-bar indeterminate" id="upload-progress-bar"></div>
    </div>

    <!-- ── State: file-loaded ── -->
    <div id="file-badge">
      <div class="badge-top">
        <div class="badge-file-icon">📄</div>
        <div class="badge-info">
          <div class="file-name" id="badge-name">file.csv</div>
          <div class="file-meta" id="badge-meta"></div>
        </div>
      </div>
      <div class="badge-actions">
        <button class="badge-btn" onclick="downloadFile('csv')">⬇ CSV</button>
        <button class="badge-btn" onclick="downloadFile('xlsx')">⬇ Excel</button>
        <button class="badge-btn rm" onclick="clearFile()">✕ Remove</button>
      </div>
    </div>
  </div>

  <!-- Quick questions -->
  <div class="sb-section grow">
    <div class="sb-label">Quick questions</div>
    <div id="suggestions">
      <button class="suggestion" onclick="suggest(this)">📊 Spending last month</button>
      <button class="suggestion" onclick="suggest(this)">🏪 Top merchants</button>
      <button class="suggestion" onclick="suggest(this)">🔁 Recurring subscriptions</button>
      <button class="suggestion" onclick="suggest(this)">📅 Monthly summary</button>
      <button class="suggestion" onclick="suggest(this)">🔍 Search for coffee</button>
    </div>
  </div>

  <!-- Footer / new-chat -->
  <div class="sb-footer">
    <!-- ── State: reset / new-chat ── -->
    <button id="clear-btn" onclick="clearChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
      New chat
    </button>
  </div>

</aside>

<!-- ─── Main panel ─────────────────────────────────────────────── -->
<div class="main">

  <!-- Top bar -->
  <div class="top-bar">
    <span id="header-subtitle-top" style="font-size:12px;color:var(--text-muted);flex:1"></span>
    <div class="status-dot" id="status-dot" title="Ready"></div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- ── State: empty ── -->
    <div id="empty-state">
      <div class="es-icon">📈</div>
      <h2>Ask about your finances</h2>
      <p>Upload a CSV or Excel file, then ask anything about your spending, budgets, or transactions.</p>
      <div class="quick-chips">
        <button class="quick-chip" onclick="chipSend('What did I spend last month?')">Last month summary</button>
        <button class="quick-chip" onclick="chipSend('Show me my top 5 merchants')">Top merchants</button>
        <button class="quick-chip" onclick="chipSend('Do I have any recurring subscriptions?')">Subscriptions</button>
        <button class="quick-chip" onclick="chipSend('How am I doing financially?')">Financial health</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <div class="input-shell" id="input-shell">
      <textarea
        id="input" rows="1"
        placeholder="Ask about your spending, budgets, transactions…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <!-- ── State: send button ── -->
      <button id="send-btn" onclick="send()" title="Send (Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let history        = [];
  let context        = {};
  let fileId         = null;
  let busy           = false;
  let sessionStarted = false;

  let providerData   = {};
  let activeProvider = 'groq';

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const suggestions = document.getElementById('suggestions');
  const fileBadge   = document.getElementById('file-badge');
  const uploadLabel = document.getElementById('upload-label');
  const modelSel    = document.getElementById('model-select');
  const ollamaWrap  = document.getElementById('ollama-url-wrap');
  const ollamaUrl   = document.getElementById('ollama-url');
  const sessionLock = document.getElementById('session-lock');
  const provPill    = document.getElementById('active-provider-pill');
  const statusDot   = document.getElementById('status-dot');
  const inputShell  = document.getElementById('input-shell');

  marked.setOptions({ breaks: true, gfm: true });

  // ── Toast helper ──────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const root  = document.getElementById('toast-root');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    root.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // ── Status dot ────────────────────────────────────────────────────────────
  function setStatus(state) {
    statusDot.className = 'status-dot' + (state ? ` ${state}` : '');
    statusDot.title = state === 'busy' ? 'Thinking…' : state === 'error' ? 'Error' : 'Ready';
  }

  // ── Init: load providers ──────────────────────────────────────────────────
  async function initProviders() {
    try {
      const res = await fetch('/api/providers');
      providerData = await res.json();
    } catch {
      providerData = {
        groq:   { models: ['llama-3.3-70b-versatile'], default_model: 'llama-3.3-70b-versatile', available: true },
        ollama: { models: ['llama3.2'], default_model: 'llama3.2', available: true },
      };
    }

    const groqAvail = providerData.groq?.available ?? true;
    if (!groqAvail) {
      document.getElementById('tab-groq').disabled = true;
      document.getElementById('tab-groq').title = providerData.groq.unavailable_reason || '';
      selectProvider('ollama');
    } else {
      selectProvider('groq');
    }
  }

  function selectProvider(p) {
    if (sessionStarted) return;
    activeProvider = p;

    document.getElementById('tab-groq').classList.toggle('active', p === 'groq');
    document.getElementById('tab-ollama').classList.toggle('active', p === 'ollama');

    const data   = providerData[p] || {};
    const models = data.models || [];

    modelSel.innerHTML = '';
    models.forEach(m => {
      const o = document.createElement('option');
      o.value = o.textContent = m;
      modelSel.appendChild(o);
    });
    if (data.default_model) modelSel.value = data.default_model;

    ollamaWrap.style.display = p === 'ollama' ? 'flex' : 'none';
    updateHeaderSubtitle();
  }

  function updateHeaderSubtitle() {
    const sub = document.getElementById('header-subtitle');
    if (sessionStarted) return;
    const label = activeProvider === 'groq' ? 'Groq (cloud)' : 'Ollama (local)';
    sub.textContent = `${label} · ${modelSel.value || ''}`;
  }

  modelSel.addEventListener('change', updateHeaderSubtitle);

  // ── State: session-locked ────────────────────────────────────────────────
  function lockProvider() {
    sessionStarted = true;
    document.getElementById('tab-groq').disabled   = true;
    document.getElementById('tab-ollama').disabled = true;
    modelSel.disabled  = true;
    ollamaUrl.disabled = true;
    sessionLock.classList.add('visible');

    provPill.classList.add('visible');
    document.getElementById('pill-dot').className = `pill-dot ${activeProvider}`;
    document.getElementById('pill-label').textContent =
      activeProvider === 'groq' ? '☁ Groq' : '⬡ Ollama';
    document.getElementById('pill-model').textContent = ' · ' + modelSel.value;

    const sub = document.getElementById('header-subtitle');
    sub.textContent = (activeProvider === 'groq' ? 'Groq (cloud)' : 'Ollama (local)') + ' · ' + modelSel.value;
  }

  function unlockProvider() {
    sessionStarted = false;
    const groqAvail = providerData.groq?.available ?? true;
    document.getElementById('tab-groq').disabled   = !groqAvail;
    document.getElementById('tab-ollama').disabled = false;
    modelSel.disabled  = false;
    ollamaUrl.disabled = false;
    sessionLock.classList.remove('visible');
    provPill.classList.remove('visible');
    updateHeaderSubtitle();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function suggest(btn) {
    const text = btn.textContent.replace(/^[^\w]+/, '').trim();
    inputEl.value = text;
    autoResize(inputEl);
    inputEl.focus();
  }

  function chipSend(text) {
    inputEl.value = text;
    autoResize(inputEl);
    send();
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  // ── Messages ──────────────────────────────────────────────────────────────
  function addMessage(role, content) {
    document.getElementById('empty-state')?.remove();
    suggestions.style.display = 'none';

    const msg    = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : role === 'bot' ? '✦' : '⚠';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'user' || role === 'error') {
      bubble.textContent = content;
    } else {
      bubble.innerHTML = marked.parse(content);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollBottom();
  }

  function addSystemMessage(md) {
    document.getElementById('empty-state')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'sys-msg';
    wrap.innerHTML = marked.parseInline(md);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  // ── State: thinking indicator ─────────────────────────────────────────────
  function showTyping() {
    const msg    = document.createElement('div');
    msg.className = 'msg bot'; msg.id = 'typing-indicator';
    const avatar  = document.createElement('div');
    avatar.className = 'avatar'; avatar.textContent = '✦';
    const bubble  = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML  = '<span></span><span></span><span></span>';
    msg.appendChild(avatar); msg.appendChild(bubble);
    messagesEl.appendChild(msg); scrollBottom();
    setStatus('busy');
    inputShell.classList.add('disabled');
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
    setStatus('');
    inputShell.classList.remove('disabled');
  }

  // ── Provider config for request ───────────────────────────────────────────
  function getProviderConfig() {
    return {
      type:       activeProvider,
      model:      modelSel.value,
      ollama_url: ollamaUrl.value.trim() || 'http://localhost:11434/v1',
    };
  }

  // ── State: chat-active / send ─────────────────────────────────────────────
  async function send() {
    if (busy) return;
    const message = inputEl.value.trim();
    if (!message) return;

    if (!sessionStarted) lockProvider();

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = ''; inputEl.style.height = 'auto';

    addMessage('user', message);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          message, history, context,
          file_id:  fileId,
          provider: getProviderConfig(),
        }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        addMessage('error', 'Error: ' + (err.detail || res.statusText));
        setStatus('error');
      } else {
        const data = await res.json();
        addMessage('bot', data.response);
        history = data.history;
        context = data.context;
        setStatus('');
      }
    } catch {
      removeTyping();
      addMessage('error', 'Network error — is the server running?');
      setStatus('error');
    }

    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  // ── State: new-chat / reset ───────────────────────────────────────────────
  function clearChat() {
    history = []; context = {};
    setStatus('');
    messagesEl.innerHTML = `
      <div id="empty-state">
        <div class="es-icon">📈</div>
        <h2>Ask about your finances</h2>
        <p>Upload a CSV or Excel file, then ask anything about your spending, budgets, or transactions.</p>
        <div class="quick-chips">
          <button class="quick-chip" onclick="chipSend('What did I spend last month?')">Last month summary</button>
          <button class="quick-chip" onclick="chipSend('Show me my top 5 merchants')">Top merchants</button>
          <button class="quick-chip" onclick="chipSend('Do I have any recurring subscriptions?')">Subscriptions</button>
          <button class="quick-chip" onclick="chipSend('How am I doing financially?')">Financial health</button>
        </div>
      </div>`;
    suggestions.style.display = 'flex';
    suggestions.style.flexDirection = 'column';
    unlockProvider();
    inputEl.focus();
  }

  // ── File upload ───────────────────────────────────────────────────────────
  async function handleUpload(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    // ── State: uploading ──
    const icon = document.getElementById('upload-label-icon');
    const text = document.getElementById('upload-label-text');
    icon.outerHTML = '<div class="upload-spinner" id="upload-label-icon"></div>';
    text.textContent = 'Uploading…';
    uploadLabel.classList.add('uploading');
    document.getElementById('upload-progress-wrap').classList.add('visible');

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        showToast('Upload failed: ' + (err.detail || res.statusText), 'error');
        return;
      }
      const data = await res.json();
      setActiveFile(data);
      addSystemMessage(`📂 Loaded **${data.filename}** — ${data.rows.toLocaleString()} rows · ${data.date_min} → ${data.date_max}`);
      showToast(`Loaded ${data.rows.toLocaleString()} rows from ${data.filename}`, 'success');
    } catch {
      showToast('Upload failed — network error.', 'error');
    } finally {
      // Restore upload button to idle state
      uploadLabel.classList.remove('uploading');
      document.getElementById('upload-progress-wrap').classList.remove('visible');
      const spinner = document.getElementById('upload-label-icon');
      if (spinner) spinner.outerHTML = '<span id="upload-label-icon">📎</span>';
      document.getElementById('upload-label-text').textContent = 'Upload CSV / Excel';
    }
  }

  // ── State: file-loaded ────────────────────────────────────────────────────
  function setActiveFile(data) {
    fileId = data.file_id;
    document.getElementById('badge-name').textContent = data.filename;
    document.getElementById('badge-meta').textContent = `${data.rows.toLocaleString()} rows`;
    fileBadge.classList.add('visible');
    uploadLabel.style.display = 'none';
    history = []; context = {};
  }

  function clearFile() {
    fileId = null;
    fileBadge.classList.remove('visible');
    uploadLabel.style.display = '';
    addSystemMessage('Switched back to sample data.');
    history = []; context = {};
  }

  function downloadFile(format) {
    if (!fileId) return;
    window.open(`/api/download/${fileId}?format=${format}`, '_blank');
  }

  // ── State: drag-over ─────────────────────────────────────────────────────
  const overlay = document.getElementById('drag-overlay');
  let dragCount = 0;

  document.addEventListener('dragenter', e => {
    if ([...e.dataTransfer.items].some(i => i.kind === 'file')) {
      dragCount++; overlay.classList.add('active');
    }
  });
  document.addEventListener('dragleave', () => {
    if (--dragCount <= 0) { dragCount = 0; overlay.classList.remove('active'); }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCount = 0; overlay.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const suffix = file.name.split('.').pop().toLowerCase();
    if (!['csv', 'xlsx', 'xls'].includes(suffix)) {
      showToast('Please drop a CSV or Excel (.xlsx / .xls) file.', 'error');
      return;
    }
    handleUpload({ files: [file], value: '' });
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  initProviders();
  inputEl.focus();
</script>
</body>
</html>
